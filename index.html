<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pay Tracker">
<meta name="theme-color" content="#0d0f14">
<meta name="description" content="Delivery Pay Tracker - Track your daily earnings and expenses">
<title>Delivery Pay Tracker</title>

<!-- PWA Manifest inline via JS -->
<script>
  const manifestData = {
    name: "Delivery Pay Tracker",
    short_name: "Pay Tracker",
    description: "Track your delivery earnings and expenses",
    start_url: "./",
    display: "standalone",
    background_color: "#0d0f14",
    theme_color: "#0d0f14",
    orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230d0f14'/><text y='130' x='20' font-size='120' font-family='Arial'>💵</text></svg>", sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%230d0f14'/><text y='360' x='40' font-size='320' font-family='Arial'>💵</text></svg>", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
  const manifestURL = URL.createObjectURL(blob);
  document.write('<link rel="manifest" href="' + manifestURL + '">');
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #f0c040;
    --accent2: #4af0a0;
    --danger: #f05060;
    --text: #e8eaf0;
    --muted: #7a8099;
    --green: #4af0a0;
    --red: #f05060;
    --yellow: #f0c040;
    --blue: #7a8fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 24px 16px 80px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(80px, env(safe-area-inset-bottom));
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(240,192,64,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,240,160,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  /* Install banner */
  .install-banner {
    display: none;
    background: linear-gradient(135deg, rgba(240,192,64,0.15), rgba(74,240,160,0.1));
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .install-banner.show { display: flex; }

  .install-banner p {
    font-size: 13px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    flex: 1;
  }

  .install-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
  }

  .install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  /* Offline banner */
  .offline-banner {
    display: none;
    background: rgba(240,80,96,0.1);
    border: 1px solid rgba(240,80,96,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  .offline-banner.show { display: block; }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .header-left p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .header-right { text-align: right; }

  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .total-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: var(--accent2);
    letter-spacing: 1px;
    line-height: 1.1;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.earn::before { background: var(--accent); }
  .summary-card.actual::before { background: var(--accent2); }
  .summary-card.expense::before { background: var(--red); }
  .summary-card.balance::before { background: var(--blue); }

  .summary-card .s-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .summary-card .s-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
  }

  .summary-card.earn .s-value { color: var(--accent); }
  .summary-card.actual .s-value { color: var(--accent2); }
  .summary-card.expense .s-value { color: var(--red); }
  .summary-card.balance .s-value { color: var(--blue); }

  /* Progress */
  .progress-wrap { margin: 0 0 28px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  /* Cycle Tabs */
  .cycle-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 20px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  
  .cycle-tabs::-webkit-scrollbar { display: none; }

  .cycle-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
  }

  .cycle-tab:hover { border-color: var(--accent); }

  .cycle-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .cycle-tab .tab-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
  }

  .cycle-tab .tab-dates {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    opacity: 0.7;
    margin-top: 2px;
  }

  .edit-cycle-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: none;
    border: none;
    color: inherit;
    opacity: 0.5;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
  }

  .edit-cycle-btn:hover { opacity: 1; }

  /* Cycle Content */
  .cycle-content {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }

  .cycle-content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cycle-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .cycle-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .cycle-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .edit-title-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
  }

  .edit-title-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .cycle-payday {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(74,240,160,0.1);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(74,240,160,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .edit-payday-btn {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 10px;
    opacity: 0.6;
  }

  .edit-payday-btn:hover { opacity: 1; }

  .cycle-chips {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .chip.expected { background: rgba(240,192,64,0.12); color: var(--accent); border: 1px solid rgba(240,192,64,0.25); }
  .chip.actual { background: rgba(74,240,160,0.12); color: var(--accent2); border: 1px solid rgba(74,240,160,0.25); }
  .chip.balance { background: rgba(122,143,255,0.12); color: var(--blue); border: 1px solid rgba(122,143,255,0.25); }

  /* Day table */
  .day-table { width: 100%; border-collapse: collapse; }

  .day-table th {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .day-table td {
    padding: 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,48,69,0.5);
    vertical-align: middle;
  }

  .day-table tr:last-child td { border-bottom: none; }
  .day-table tr.off-day td { opacity: 0.65; }
  .day-table tr.no-work td { opacity: 0.45; }
  .day-table tr.no-work .day-badge { background: rgba(240,80,96,0.15); color: var(--red); }

  .day-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
  }

  .day-badge.off { background: rgba(240,192,64,0.1); color: var(--yellow); }

  .date-cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .date-text {
    color: var(--muted);
    font-size: 12px;
  }

  .edit-date-btn {
    font-size: 10px;
    color: var(--accent);
    cursor: pointer;
    opacity: 0.6;
    font-family: 'DM Mono', monospace;
  }

  .edit-date-btn:hover { opacity: 1; }

  .earn-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 8px;
    width: 70px;
    outline: none;
    transition: all 0.2s;
    -webkit-appearance: none;
  }

  .earn-input:focus { border-color: var(--accent); }
  .earn-input.expected { color: var(--accent); }
  .earn-input.actual { color: var(--accent2); }
  .earn-input::placeholder { color: var(--muted); }

  .note-text { font-size: 10px; color: var(--red); font-family: 'DM Mono', monospace; display: block; margin-top: 2px; }

  /* Expense section */
  .expense-section { padding: 16px; background: rgba(0,0,0,0.2); }

  .expense-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .expense-section h4 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .add-expense-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-expense-btn:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .expense-list { margin-bottom: 16px; }

  .expense-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .expense-item input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .expense-item input:focus { border-color: var(--red); }

  .expense-item .expense-label-input { flex: 1; min-width: 0; }
  .expense-item .expense-amount-input {
    width: 80px;
    font-family: 'DM Mono', monospace;
    color: var(--red);
  }

  .expense-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .expense-delete:hover { color: var(--danger); }

  .expense-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .expense-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    background: var(--surface2);
    padding: 10px;
    border-radius: 8px;
    gap: 6px;
  }

  .expense-row .e-label { color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .expense-row .e-amount { color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; }
  .expense-row .e-amount.special { color: #ff8c60; font-weight: 600; }

  /* Cycle totals */
  .cycle-totals {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
  }

  .total-row { display: flex; flex-direction: column; gap: 2px; }

  .total-row .t-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .total-row .t-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .t-val.bf { color: var(--blue); }
  .t-val.earned { color: var(--accent); }
  .t-val.actual { color: var(--accent2); }
  .t-val.deducted { color: var(--red); }
  .t-val.balance { color: #c8a8ff; }

  /* Warning */
  .warning {
    background: rgba(240,80,96,0.08);
    border: 1px solid rgba(240,80,96,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    margin: 0 16px 16px;
  }

  /* Footer */
  .footer-note {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 32px;
    letter-spacing: 1px;
    padding-bottom: 20px;
  }

  /* Saved toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent2);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    margin-bottom: 12px;
    outline: none;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn.primary {
    background: var(--accent);
    color: #000;
  }

  .modal-btn.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .day-type-select {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .type-option {
    flex: 1;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .type-option:hover { border-color: var(--accent); }
  .type-option.selected {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .add-day-btn {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .add-day-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .delete-day-btn {
    background: rgba(240,80,96,0.1);
    border: 1px solid rgba(240,80,96,0.3);
    color: var(--red);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    margin-top: 16px;
    width: 100%;
  }

  .delete-day-btn:hover {
    background: rgba(240,80,96,0.2);
  }

  .add-cycle-btn {
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    transition: all 0.2s;
  }

  .add-cycle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<!-- Edit Cycle Modal -->
<div class="modal-overlay" id="cycle-modal">
  <div class="modal">
    <h3>Edit Cycle</h3>

    <button class="delete-day-btn" onclick="deleteCurrentCycle()">Delete This Cycle</button>
    
    <div class="modal-buttons">
      <button class="modal-btn secondary" onclick="closeCycleModal()">Cancel</button>
      <button class="modal-btn primary" onclick="saveCycleEdit()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── PWA SERVICE WORKER ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'pay-tracker-v4';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ─── INSTALL PROMPT ──────────────────────────────────────────────────────────
let deferredPrompt;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('install-dismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

dismissBtn.addEventListener('click', () => installBanner.classList.remove('show'));

// ─── OFFLINE DETECTION ───────────────────────────────────────────────────────
const offlineBanner = document.getElementById('offline-banner');
function updateOnline() {
  offlineBanner.classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);
updateOnline();

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg = '✓ Saved') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── DATA ────────────────────────────────────────────────────────────────────
const DAILY_EXP = 48;
const WIFE = 50;

// Generate default cycles (Mon to next Wed = 10 days)
function generateDefaultCycles() {
  const cycles = [];
  const startDate = new Date(2026, 1, 23); // Feb 23, 2026 (Monday)
  
  for (let i = 0; i < 5; i++) {
    const cycleStart = new Date(startDate);
    cycleStart.setDate(startDate.getDate() + (i * 10));
    
    const cycleEnd = new Date(cycleStart);
    cycleEnd.setDate(cycleStart.getDate() + 9); // 10 days total
    
    const payday = new Date(cycleEnd);
    payday.setDate(cycleEnd.getDate() + 3); // Payday is Wednesday after cycle ends
    
    const days = [];
    const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    
    for (let d = 0; d < 10; d++) {
      const currentDate = new Date(cycleStart);
      currentDate.setDate(cycleStart.getDate() + d);
      
      const dayOfWeek = currentDate.getDay();
      const dayName = dayNames[(dayOfWeek + 6) % 7]; // Convert to Mon-Sun
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
      const dateStr = `${currentDate.getDate()} ${currentDate.toLocaleString('default', { month: 'short' })}`;
      
      days.push({
        date: dateStr,
        day: dayName,
        type: isWeekend ? 'off' : 'work',
        expected: isWeekend ? 100 : 200
      });
    }
    
    const formatDate = (date) => `${date.getDate()} ${date.toLocaleString('default', { month: 'short' })}`;
    const formatPayday = (date) => {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      return `${days[date.getDay()]} ${formatDate(date)}`;
    };
    
    cycles.push({
      num: i + 1,
      label: `Cycle ${i + 1}`,
      dates: `${formatDate(cycleStart)} – ${formatDate(cycleEnd)}`,
      payday: formatPayday(payday),
      days: days,
      expenseDays: 10,
      extras: [],
      warning: null
    });
  }
  
  return cycles;
}

let cycles = [];
let actual = [];
let currentCycleIndex = 0;
let editingDay = null;
let editingCycle = null;

// Load saved data
function initData() {
  try {
    const saved = localStorage.getItem("pay_tracker_v4");
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.cycles && parsed.cycles.length > 0) {
        cycles = parsed.cycles;
        actual = parsed.actual || cycles.map(c => c.days.map(() => null));
      } else {
        cycles = generateDefaultCycles();
        actual = cycles.map(c => c.days.map(() => null));
      }
    } else {
      cycles = generateDefaultCycles();
      actual = cycles.map(c => c.days.map(() => null));
    }
  } catch(e) {
    console.error("Load error:", e);
    cycles = generateDefaultCycles();
    actual = cycles.map(c => c.days.map(() => null));
  }
}

function save() {
  try {
    localStorage.setItem("pay_tracker_v4", JSON.stringify({ cycles, actual }));
    showToast('✓ Saved');
  } catch(e) { console.error("Save error:", e); }
}

// ─── CALCULATIONS ────────────────────────────────────────────────────────────
function calcCycle(ci) {
  const c = cycles[ci];
  const expExp = c.days.reduce((s, d) => s + (parseFloat(d.expected) || 0), 0);
  const actEarn = actual[ci].reduce((s, v) => s + (v !== null ? v : 0), 0);
  const hasActual = actual[ci].some(v => v !== null);
  const totalExp = (DAILY_EXP * c.expenseDays) + WIFE + 
    c.extras.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
  return { expExp, actEarn, hasActual, totalExp };
}

function calcAllBalances() {
  let bf = 0;
  return cycles.map((c, ci) => {
    const { expExp, actEarn, hasActual, totalExp } = calcCycle(ci);
    const earned = hasActual ? actEarn : expExp;
    const balance = bf + earned - totalExp;
    const result = { bf, earned, expExp, actEarn, hasActual, totalExp, balance };
    bf = balance;
    return result;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function updateDateRange() {
  if (cycles.length === 0) return;
  const first = cycles[0].dates.split('–')[0].trim();
  const last = cycles[cycles.length - 1].dates.split('–')[1].trim();
  document.getElementById('date-range').textContent = `${first} → ${last}`;
}

function renderTabs() {
  const container = document.getElementById("cycle-tabs");
  let html = cycles.map((c, i) => `
    <div class="cycle-tab ${i === currentCycleIndex ? 'active' : ''}" onclick="switchCycle(${i})">
      <button class="edit-cycle-btn" onclick="event.stopPropagation(); openCycleModal(${i})">✎</button>
      <div class="tab-num">CYCLE ${c.num}</div>
      <div class="tab-dates">${c.dates}</div>
    </div>
  `).join("");
  
  html += `<button class="add-cycle-btn" onclick="addNewCycle()">+ Add Cycle</button>`;
  container.innerHTML = html;
}

function switchCycle(index) {
  currentCycleIndex = index;
  renderTabs();
  renderCycles();
}

function renderCycles() {
  const balances = calcAllBalances();
  const container = document.getElementById("cycles-container");
  container.innerHTML = "";

  // Update summary
  let totalExpected = 0, totalActual = 0, totalExpenses = 0;
  cycles.forEach((c, ci) => {
    const { expExp, actEarn, totalExp } = calcCycle(ci);
    totalExpected += expExp;
    totalActual += actEarn;
    totalExpenses += totalExp;
  });
  
  const finalBalance = balances.length > 0 ? balances[balances.length - 1].balance : 0;

  document.getElementById("s-expected").textContent = "$" + totalExpected.toLocaleString();
  document.getElementById("s-actual").textContent = "$" + totalActual.toLocaleString();
  document.getElementById("s-expense").textContent = "$" + totalExpenses.toLocaleString();
  document.getElementById("s-balance").textContent = "$" + Math.round(finalBalance).toLocaleString();
  document.getElementById("grand-balance").textContent = "$" + Math.round(finalBalance).toLocaleString();

  const pct = totalExpected > 0 ? Math.min(100, Math.round((totalActual / totalExpected) * 100)) : 0;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";

  updateDateRange();

  if (cycles.length === 0) {
    container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted);">No cycles yet. Click "Add Cycle" to start.</div>';
    return;
  }

  // Render current cycle
  const ci = currentCycleIndex;
  const c = cycles[ci];
  const b = balances[ci];
  
  const div = document.createElement("div");
  div.className = "cycle-content active";

  const warnHTML = c.warning ? `<div class="warning">⚠ ${c.warning}</div>` : "";

  const dayRows = c.days.map((d, di) => {
    const actVal = actual[ci][di];
    const isNoWork = d.type === "nowork";
    const isOff = d.type === "off";
    const rowClass = isNoWork ? "no-work" : isOff ? "off-day" : "";
    const badgeClass = isOff ? "off" : "";
    const noteHTML = d.note ? `<span class="note-text">${d.note}</span>` : "";
    
    return `<tr class="${rowClass}" onclick="openEditModal(${ci}, ${di})" style="cursor: pointer;">
      <td><span class="day-badge ${badgeClass}">${d.day}</span></td>
      <td>
        <div class="date-cell">
          <span class="date-text">${d.date}</span>
          <span class="edit-date-btn">✎ Edit</span>
        </div>
        ${noteHTML}
      </td>
      <td class="earn-expected" style="color: var(--accent); font-family: 'DM Mono', monospace;">$${d.expected || 0}</td>
      <td style="color: var(--accent2); font-family: 'DM Mono', monospace; font-weight: 500;">
        ${actVal !== null ? '$' + actVal : '—'}
      </td>
    </tr>`;
  }).join("");

  const expenseItemsHTML = c.extras.map((e, ei) => `
    <div class="expense-item">
      <input type="text" class="expense-label-input" value="${e.label}" 
        onchange="updateExtraLabel(${ci}, ${ei}, this.value)" placeholder="Description">
      <input type="number" class="expense-amount-input" value="${e.amount}" 
        onchange="updateExtraAmount(${ci}, ${ei}, this.value)" placeholder="Amount">
      <button class="expense-delete" onclick="deleteExtra(${ci}, ${ei})">×</button>
    </div>
  `).join("");

  div.innerHTML = `
    <div class="cycle-header">
      <div class="cycle-title-row">
        <div class="cycle-title">
          ${c.label}
          <button class="edit-title-btn" onclick="openCycleModal(${ci})">✎ Edit</button>
        </div>
        <div class="cycle-payday">
          💰 ${c.payday}
          <button class="edit-payday-btn" onclick="openCycleModal(${ci})">✎</button>
        </div>
      </div>
      <div class="cycle-chips">
        <span class="chip expected">EXP $${b.expExp}</span>
        <span class="chip actual">ACT $${b.actEarn}</span>
        <span class="chip balance">BAL $${Math.round(b.balance)}</span>
      </div>
    </div>
    ${warnHTML}
    <table class="day-table">
      <thead><tr>
        <th>Day</th><th>Date</th><th>Expected</th><th>Actual</th>
      </tr></thead>
      <tbody>${dayRows}</tbody>
    </table>
    <button class="add-day-btn" onclick="addNewDay(${ci})">+ Add Day to Cycle</button>
    <div class="expense-section">
      <div class="expense-header">
        <h4>Expenses · ${c.expenseDays} days</h4>
        <button class="add-expense-btn" onclick="addExtra(${ci})">+ Add Expense</button>
      </div>
      
      <div class="expense-list" id="expense-list-${ci}">
        ${expenseItemsHTML}
      </div>

      <div class="expense-grid">
        <div class="expense-row">
          <span class="e-label">🚬 Cigs ×${c.expenseDays}d</span>
          <span class="e-amount">−$${18*c.expenseDays}</span>
        </div>
        <div class="expense-row">
          <span class="e-label">🍱 Food ×${c.expenseDays}d</span>
          <span class="e-amount">−$${20*c.expenseDays}</span>
        </div>
        <div class="expense-row">
          <span class="e-label">⛽ Petrol ×${c.expenseDays}d</span>
          <span class="e-amount">−$${10*c.expenseDays}</span>
        </div>
        <div class="expense-row">
          <span class="e-label">💑 Wife</span>
          <span class="e-amount">−$${WIFE}</span>
        </div>
      </div>

      <div class="cycle-totals">
        <div class="total-row"><span class="t-label">Bring Forward</span><span class="t-val bf">$${Math.round(b.bf)}</span></div>
        <div class="total-row"><span class="t-label">Expected Earn</span><span class="t-val earned">$${b.expExp}</span></div>
        <div class="total-row"><span class="t-label">Actual Earn</span><span class="t-val actual">$${b.actEarn}</span></div>
        <div class="total-row"><span class="t-label">Total Deducted</span><span class="t-val deducted">−$${b.totalExp}</span></div>
        <div class="total-row" style="grid-column:1/-1">
          <span class="t-label">Balance After Payday</span>
          <span class="t-val balance" style="font-size:28px;">$${Math.round(b.balance)}</span>
        </div>
      </div>
    </div>
  `;

  container.appendChild(div);
}

// ─── CYCLE MANAGEMENT ────────────────────────────────────────────────────────
function addNewCycle() {
  const newNum = cycles.length > 0 ? Math.max(...cycles.map(c => c.num)) + 1 : 1;
  const lastCycle = cycles[cycles.length - 1];
  
  let startDate;
  if (lastCycle) {
    const lastDate = lastCycle.dates.split('–')[1].trim();
    // Parse and add one day
    const parts = lastDate.split(' ');
    const day = parseInt(parts[0]);
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const month = monthNames.indexOf(parts[1]);
    const year = 2026;
    startDate = new Date(year, month, day + 1);
  } else {
    startDate = new Date(2026, 1, 23);
  }
  
  const cycleEnd = new Date(startDate);
  cycleEnd.setDate(startDate.getDate() + 9);
  
  const payday = new Date(cycleEnd);
  payday.setDate(cycleEnd.getDate() + 3);
  
  const formatDate = (date) => `${date.getDate()} ${date.toLocaleString('default', { month: 'short' })}`;
  const formatPayday = (date) => {
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    return `${days[date.getDay()]} ${formatDate(date)}`;
  };
  
  const newCycle = {
    num: newNum,
    label: `Cycle ${newNum}`,
    dates: `${formatDate(startDate)} – ${formatDate(cycleEnd)}`,
    payday: formatPayday(payday),
    days: [],
    expenseDays: 10,
    extras: [],
    warning: null
  };
  
  cycles.push(newCycle);
  actual.push([]);
  currentCycleIndex = cycles.length - 1;
  save();
  renderTabs();
  renderCycles();
  showToast('✓ Cycle added');
}

function openCycleModal(ci) {
  editingCycle = ci;
  const c = cycles[ci];
  document.getElementById('modal-cycle-name').value = c.label;
  document.getElementById('modal-cycle-dates').value = c.dates;
  document.getElementById('modal-cycle-payday').value = c.payday;
  document.getElementById('modal-cycle-expense-days').value = c.expenseDays;
  document.getElementById('modal-cycle-warning').value = c.warning || '';
  document.getElementById('cycle-modal').classList.add('show');
}

function closeCycleModal() {
  document.getElementById('cycle-modal').classList.remove('show');
  editingCycle = null;
}

function saveCycleEdit() {
  if (editingCycle === null) return;
  const c = cycles[editingCycle];
  
  c.label = document.getElementById('modal-cycle-name').value || c.label;
  c.dates = document.getElementById('modal-cycle-dates').value || c.dates;
  c.payday = document.getElementById('modal-cycle-payday').value || c.payday;
  c.expenseDays = parseInt(document.getElementById('modal-cycle-expense-days').value) || c.expenseDays;
  c.warning = document.getElementById('modal-cycle-warning').value || null;
  
  save();
  closeCycleModal();
  renderTabs();
  renderCycles();
}

function deleteCurrentCycle() {
  if (editingCycle === null) return;
  if (!confirm('Are you sure you want to delete this entire cycle? This cannot be undone.')) return;
  
  cycles.splice(editingCycle, 1);
  actual.splice(editingCycle, 1);
  
  if (currentCycleIndex >= cycles.length) {
    currentCycleIndex = Math.max(0, cycles.length - 1);
  }
  
  save();
  closeCycleModal();
  renderTabs();
  renderCycles();
  showToast('✓ Cycle deleted');
}

// ─── DAY MANAGEMENT ───────────────────────────────────────────────────────────
function addNewDay(ci) {
  const c = cycles[ci];
  const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  
  // Get last date
  let lastDate;
  if (c.days.length > 0) {
    const lastDay = c.days[c.days.length - 1];
    const parts = lastDay.date.split(' ');
    const day = parseInt(parts[0]);
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const month = monthNames.indexOf(parts[1]);
    lastDate = new Date(2026, month, day + 1);
  } else {
    const parts = c.dates.split('–')[0].trim().split(' ');
    const day = parseInt(parts[0]);
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const month = monthNames.indexOf(parts[1]);
    lastDate = new Date(2026, month, day);
  }
  
  const dayOfWeek = lastDate.getDay();
  const dayName = dayNames[(dayOfWeek + 6) % 7];
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
  const dateStr = `${lastDate.getDate()} ${lastDate.toLocaleString('default', { month: 'short' })}`;
  
  c.days.push({
    date: dateStr,
    day: dayName,
    type: isWeekend ? 'off' : 'work',
    expected: isWeekend ? 100 : 200
  });
  
  actual[ci].push(null);
  save();
  renderCycles();
  showToast('✓ Day added');
}

function openEditModal(ci, di) {
  editingDay = { ci, di };
  const day = cycles[ci].days[di];
  const actVal = actual[ci][di];
  
  document.getElementById('modal-day-info').textContent = `Cycle ${cycles[ci].num} · Day ${di + 1} of ${cycles[ci].days.length}`;
  document.getElementById('modal-date').value = day.date;
  document.getElementById('modal-day-name').value = day.day;
  document.getElementById('modal-expected').value = day.expected || 0;
  document.getElementById('modal-actual').value = actVal !== null ? actVal : '';
  document.getElementById('modal-note').value = day.note || '';
  
  // Set type selection
  document.querySelectorAll('.type-option').forEach(opt => {
    opt.classList.toggle('selected', opt.dataset.type === day.type);
    opt.onclick = () => {
      document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      // Auto-update expected based on type
      const expInput = document.getElementById('modal-expected');
      if (opt.dataset.type === 'work') expInput.value = 200;
      else if (opt.dataset.type === 'off') expInput.value = 100;
      else expInput.value = 0;
    };
  });
  
  document.getElementById('edit-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('show');
  editingDay = null;
}

function saveDayEdit() {
  if (!editingDay) return;
  const { ci, di } = editingDay;
  const day = cycles[ci].days[di];
  
  const selectedType = document.querySelector('.type-option.selected')?.dataset.type || day.type;
  const date = document.getElementById('modal-date').value.trim();
  const dayName = document.getElementById('modal-day-name').value.trim();
  const expected = parseFloat(document.getElementById('modal-expected').value) || 0;
  const actualVal = document.getElementById('modal-actual').value;
  const note = document.getElementById('modal-note').value;
  
  day.type = selectedType;
  day.date = date || day.date;
  day.day = dayName || day.day;
  day.expected = expected;
  day.note = note || undefined;
  
  if (actualVal.trim() === '') {
    actual[ci][di] = null;
  } else {
    actual[ci][di] = parseFloat(actualVal) || 0;
  }
  
  save();
  closeModal();
  renderCycles();
}

function deleteCurrentDay() {
  if (!editingDay) return;
  const { ci, di } = editingDay;
  
  if (!confirm('Delete this day?')) return;
  
  cycles[ci].days.splice(di, 1);
  actual[ci].splice(di, 1);
  
  save();
  closeModal();
  renderCycles();
  showToast('✓ Day deleted');
}

// ─── EXPENSE MANAGEMENT ──────────────────────────────────────────────────────
function addExtra(ci) {
  cycles[ci].extras.push({ label: "New Expense", amount: 0 });
  save();
  renderCycles();
  setTimeout(() => {
    const list = document.getElementById(`expense-list-${ci}`);
    if (list) {
      const inputs = list.querySelectorAll('.expense-label-input');
      if (inputs.length > 0) inputs[inputs.length - 1].focus();
    }
  }, 50);
}

function updateExtraLabel(ci, ei, value) {
  cycles[ci].extras[ei].label = value;
  save();
  renderCycles();
}

function updateExtraAmount(ci, ei, value) {
  cycles[ci].extras[ei].amount = parseFloat(value) || 0;
  save();
  renderCycles();
}

function deleteExtra(ci, ei) {
  if (confirm('Delete this expense?')) {
    cycles[ci].extras.splice(ei, 1);
    save();
    renderCycles();
  }
}

// Close modals on overlay click
document.getElementById('edit-modal').addEventListener('click', (e) => {
  if (e.target.id === 'edit-modal') closeModal();
});
document.getElementById('cycle-modal').addEventListener('click', (e) => {
  if (e.target.id === 'cycle-modal') closeCycleModal();
});

// ─── INITIALIZE ──────────────────────────────────────────────────────────────
initData();
renderTabs();
renderCycles();
</script>
</body>
</html>
