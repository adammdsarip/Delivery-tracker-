<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pay Tracker">
<meta name="theme-color" content="#0d0f14">
<meta name="description" content="Delivery Pay Tracker - Track your daily earnings and expenses">
<title>Delivery Pay Tracker</title>

<!-- PWA Manifest inline via JS -->
<script>
  const manifestData = {
    name: "Delivery Pay Tracker",
    short_name: "Pay Tracker",
    description: "Track your delivery earnings and expenses",
    start_url: "./",
    display: "standalone",
    background_color: "#0d0f14",
    theme_color: "#0d0f14",
    orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230d0f14'/><text y='130' x='20' font-size='120' font-family='Arial'>💵</text></svg>", sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%230d0f14'/><text y='360' x='40' font-size='320' font-family='Arial'>💵</text></svg>", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
  const manifestURL = URL.createObjectURL(blob);
  document.write('<link rel="manifest" href="' + manifestURL + '">');
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #f0c040;
    --accent2: #4af0a0;
    --danger: #f05060;
    --text: #e8eaf0;
    --muted: #7a8099;
    --green: #4af0a0;
    --red: #f05060;
    --yellow: #f0c040;
    --blue: #7a8fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 24px 16px 80px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(80px, env(safe-area-inset-bottom));
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(240,192,64,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,240,160,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  /* Install banner */
  .install-banner {
    display: none;
    background: linear-gradient(135deg, rgba(240,192,64,0.15), rgba(74,240,160,0.1));
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .install-banner.show { display: flex; }

  .install-banner p {
    font-size: 13px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    flex: 1;
  }

  .install-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
  }

  .install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  /* Offline banner */
  .offline-banner {
    display: none;
    background: rgba(240,80,96,0.1);
    border: 1px solid rgba(240,80,96,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  .offline-banner.show { display: block; }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .header-left p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .header-right { text-align: right; }

  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .total-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: var(--accent2);
    letter-spacing: 1px;
    line-height: 1.1;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.earn::before { background: var(--accent); }
  .summary-card.actual::before { background: var(--accent2); }
  .summary-card.expense::before { background: var(--red); }
  .summary-card.balance::before { background: var(--blue); }

  .summary-card .s-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .summary-card .s-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
  }

  .summary-card.earn .s-value { color: var(--accent); }
  .summary-card.actual .s-value { color: var(--accent2); }
  .summary-card.expense .s-value { color: var(--red); }
  .summary-card.balance .s-value { color: var(--blue); }

  /* Progress */
  .progress-wrap { margin: 0 0 28px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  /* Cycle Tabs */
  .cycle-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 20px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  
  .cycle-tabs::-webkit-scrollbar { display: none; }

  .cycle-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
  }

  .cycle-tab:hover { border-color: var(--accent); }

  .cycle-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .cycle-tab .tab-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
  }

  .cycle-tab .tab-dates {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    opacity: 0.7;
    margin-top: 2px;
  }

  .edit-cycle-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: none;
    border: none;
    color: inherit;
    opacity: 0.5;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
  }

  .edit-cycle-btn:hover { opacity: 1; }

  /* Cycle Content */
  .cycle-content {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }

  .cycle-content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cycle-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .cycle-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .cycle-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .edit-title-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
  }

  .edit-title-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .cycle-payday {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(74,240,160,0.1);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(74,240,160,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .edit-payday-btn {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 10px;
    opacity: 0.6;
  }

  .edit-payday-btn:hover { opacity: 1; }

  .cycle-chips {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .chip.expected { background: rgba(240,192,64,0.12); color: var(--accent); border: 1px solid rgba(240,192,64,0.25); }
  .chip.actual { background: rgba(74,240,160,0.12); color: var(--accent2); border: 1px solid rgba(74,240,160,0.25); }
  .chip.balance { background: rgba(122,143,255,0.12); color: var(--blue); border: 1px solid rgba(122,143,255,0.25); }

  /* Day table */
  .day-table { width: 100%; border-collapse: collapse; }

  .day-table th {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .day-table td {
    padding: 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,48,69,0.5);
    vertical-align: middle;
  }

  .day-table tr:last-child td { border-bottom: none; }
  .day-table tr.off-day td { opacity: 0.65; }
  .day-table tr.no-work td { opacity: 0.45; }
  .day-table tr.no-work .day-badge { background: rgba(240,80,96,0.15); color: var(--red); }

  .day-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
  }

  .day-badge.off { background: rgba(240,192,64,0.1); color: var(--yellow); }

  .date-cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .date-text {
    color: var(--muted);
    font-size: 12px;
  }

  .edit-date-btn {
    font-size: 10px;
    color: var(--accent);
    cursor: pointer;
    opacity: 0.6;
    font-family: 'DM Mono', monospace;
  }

  .edit-date-btn:hover { opacity: 1; }

  .earn-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 8px;
    width: 70px;
    outline: none;
    transition: all 0.2s;
    -webkit-appearance: none;
  }

  .earn-input:focus { border-color: var(--accent); }
  .earn-input.expected { color: var(--accent); }
  .earn-input.actual { color: var(--accent2); }
  .earn-input::placeholder { color: var(--muted); }

  .note-text { font-size: 10px; color: var(--red); font-family: 'DM Mono', monospace; display: block; margin-top: 2px; }

  /* Expense section */
  .expense-section { padding: 16px; background: rgba(0,0,0,0.2); }

  .expense-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .expense-section h4 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .add-expense-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-expense-btn:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .expense-list { margin-bottom: 16px; }

  .expense-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .expense-item input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .expense-item input:focus { border-color: var(--red); }

  .expense-item .expense-label-input { flex: 1; min-width: 0; }
  .expense-item .expense-amount-input {
    width: 80px;
    font-family: 'DM Mono', monospace;
    color: var(--red);
  }

  .expense-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .expense-delete:hover { color: var(--danger); }

  .expense-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .expense-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    background: var(--surface2);
    padding: 10px;
    border-radius: 8px;
    gap: 6px;
  }

  .expense-row .e-label { color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .expense-row .e-amount { color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; }
  .expense-row .e-amount.special { color: #ff8c60; font-weight: 600; }

  /* Cycle totals */
  .cycle-totals {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
  }

  .total-row { display: flex; flex-direction: column; gap: 2px; }

  .total-row .t-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .total-row .t-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .t-val.bf { color: var(--blue); }
  .t-val.earned { color: var(--accent); }
  .t-val.actual { color: var(--accent2); }
  .t-val.deducted { color: var(--red); }
  .t-val.balance { color: #c8a8ff; }

  /* Warning */
  .warning {
    background: rgba(240,80,96,0.08);
    border: 1px solid rgba(240,80,96,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    margin: 0 16px 16px;
  }

  /* Footer */
  .footer-note {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 32px;
    letter-spacing: 1px;
    padding-bottom: 20px;
  }

  /* Saved toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent2);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    margin-bottom: 12px;
    outline: none;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn.primary {
    background: var(--accent);
    color: #000;
  }

  .modal-btn.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .day-type-select {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .type-option {
    flex: 1;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .type-option:hover { border-color: var(--accent); }
  .type-option.selected {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .add-day-btn {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .add-day-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .delete-day-btn {
    background: rgba(240,80,96,0.1);
    border: 1px solid rgba(240,80,96,0.3);
    color: var(--red);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    margin-top: 16px;
    width: 100%;
  }

  .delete-day-btn:hover {
    background: rgba(240,80,96,0.2);
  }

  .add-cycle-btn {
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    transition: all 0.2s;
  }

  .add-cycle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
