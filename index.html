<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Pay Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #f0c040;
    --accent2: #4af0a0;
    --danger: #f05060;
    --text: #e8eaf0;
    --muted: #7a8099;
    --green: #4af0a0;
    --red: #f05060;
    --yellow: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(240,192,64,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,240,160,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .header-left p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .header-right {
    text-align: right;
  }

  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .total-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: var(--accent2);
    letter-spacing: 1px;
    line-height: 1.1;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.earn::before { background: var(--accent); }
  .summary-card.actual::before { background: var(--accent2); }
  .summary-card.expense::before { background: var(--red); }
  .summary-card.balance::before { background: #7a8fff; }

  .summary-card .s-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .summary-card .s-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 1px;
  }

  .summary-card.earn .s-value { color: var(--accent); }
  .summary-card.actual .s-value { color: var(--accent2); }
  .summary-card.expense .s-value { color: var(--red); }
  .summary-card.balance .s-value { color: #7a8fff; }

  /* Cycles */
  .cycle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .cycle:hover { border-color: #3a4060; }

  .cycle-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    background: var(--surface);
    user-select: none;
    flex-wrap: wrap;
    gap: 8px;
  }

  .cycle-header:hover { background: var(--surface2); }

  .cycle-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cycle-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    background: var(--accent);
    color: #000;
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 1px;
  }

  .cycle-dates {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .cycle-payday {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .cycle-chips {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .chip.expected { background: rgba(240,192,64,0.12); color: var(--accent); border: 1px solid rgba(240,192,64,0.25); }
  .chip.actual { background: rgba(74,240,160,0.12); color: var(--accent2); border: 1px solid rgba(74,240,160,0.25); }
  .chip.balance { background: rgba(122,143,255,0.12); color: #7a8fff; border: 1px solid rgba(122,143,255,0.25); }

  .chevron {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.25s;
  }

  .cycle.open .chevron { transform: rotate(180deg); }

  .cycle-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .cycle.open .cycle-body { display: block; }

  /* Day table */
  .day-table {
    width: 100%;
    border-collapse: collapse;
  }

  .day-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 20px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .day-table td {
    padding: 10px 20px;
    font-size: 14px;
    border-bottom: 1px solid rgba(42,48,69,0.5);
  }

  .day-table tr:last-child td { border-bottom: none; }

  .day-table tr.off-day td { opacity: 0.6; }
  .day-table tr.no-work td { opacity: 0.5; }
  .day-table tr.no-work .day-badge { background: rgba(240,80,96,0.15); color: var(--red); }

  .day-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
  }

  .day-badge.off { background: rgba(240,192,64,0.1); color: var(--yellow); }

  .earn-expected { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 13px; }
  .earn-actual-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 4px 8px;
    width: 90px;
    outline: none;
    transition: border-color 0.2s;
  }

  .earn-actual-input:focus { border-color: var(--accent2); }
  .earn-actual-input::placeholder { color: var(--muted); }

  .note-text {
    font-size: 11px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
  }

  /* Expense section */
  .expense-section {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: rgba(0,0,0,0.2);
  }

  .expense-section h4 {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .expense-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }

  .expense-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    background: var(--surface2);
    padding: 8px 12px;
    border-radius: 8px;
  }

  .expense-row .e-label { color: var(--muted); }
  .expense-row .e-amount { color: var(--red); font-family: 'DM Mono', monospace; }
  .expense-row .e-amount.special { color: #ff8c60; font-weight: 600; }

  /* Cycle totals */
  .cycle-totals {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }

  .total-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .total-row .t-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .total-row .t-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
  }

  .t-val.bf { color: #7a8fff; }
  .t-val.earned { color: var(--accent); }
  .t-val.actual { color: var(--accent2); }
  .t-val.deducted { color: var(--red); }
  .t-val.balance { color: #c8a8ff; }

  /* Warning banner */
  .warning {
    background: rgba(240,80,96,0.08);
    border: 1px solid rgba(240,80,96,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  /* Progress bar */
  .progress-wrap {
    margin: 20px 0 28px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  /* Footer */
  .footer-note {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 32px;
    letter-spacing: 1px;
  }

  @media (max-width: 500px) {
    .header-left h1 { font-size: 38px; }
    .total-amount { font-size: 32px; }
    .day-table th, .day-table td { padding: 8px 12px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>PAY TRACKER</h1>
      <p>26 FEB → 1 APR 2026 · DELIVERY</p>
    </div>
    <div class="header-right">
      <div class="total-label">Balance on 1 Apr</div>
      <div class="total-amount" id="grand-balance">$2,336</div>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-card earn">
      <div class="s-label">Expected Earn</div>
      <div class="s-value" id="s-expected">$5,300</div>
    </div>
    <div class="summary-card actual">
      <div class="s-label">Actual Earn</div>
      <div class="s-value" id="s-actual">$0</div>
    </div>
    <div class="summary-card expense">
      <div class="s-label">Total Expenses</div>
      <div class="s-value" id="s-expense">$2,964</div>
    </div>
    <div class="summary-card balance">
      <div class="s-label">Net Balance</div>
      <div class="s-value" id="s-balance">$2,336</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>PROGRESS TO 1 APR</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Cycles will be injected here -->
  <div id="cycles-container"></div>

  <div class="footer-note">⚡ TAP CYCLE HEADER TO EXPAND · ENTER ACTUAL DAILY INCOME TO TRACK</div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const DAILY_EXP = 48; // cigs $18 + food $20 + petrol avg $10
const WIFE = 50;

const cycles = [
  {
    num: 1,
    label: "Cycle 1",
    dates: "26 Feb – 1 Mar",
    payday: "Wed 4 Mar",
    days: [
      { date: "26 Feb", day: "Wed", type: "work" },
      { date: "27 Feb", day: "Thu", type: "work" },
      { date: "28 Feb", day: "Fri", type: "work" },
      { date: "1 Mar",  day: "Sat", type: "work" },
      { date: "2 Mar",  day: "Sun", type: "off" },
    ],
    expenseDays: 5,
    extras: [],
    warning: null
  },
  {
    num: 2,
    label: "Cycle 2",
    dates: "2 Mar – 8 Mar",
    payday: "Wed 11 Mar",
    days: [
      { date: "2 Mar",  day: "Mon", type: "work" },
      { date: "3 Mar",  day: "Tue", type: "work" },
      { date: "4 Mar",  day: "Wed", type: "work" },
      { date: "5 Mar",  day: "Thu", type: "work" },
      { date: "6 Mar",  day: "Fri", type: "work" },
      { date: "7 Mar",  day: "Sat", type: "work" },
      { date: "8 Mar",  day: "Sun", type: "off" },
    ],
    expenseDays: 8,
    extras: [
      { label: "🏍️ Bike Payment (10 Mar)", amount: 450 }
    ],
    warning: "⚠️  Bike payment $450 due 10 Mar. Don't overspend after 4 Mar payday!"
  },
  {
    num: 3,
    label: "Cycle 3",
    dates: "9 Mar – 15 Mar",
    payday: "Wed 18 Mar",
    days: [
      { date: "9 Mar",  day: "Mon", type: "work" },
      { date: "10 Mar", day: "Tue", type: "work" },
      { date: "11 Mar", day: "Wed", type: "work" },
      { date: "12 Mar", day: "Thu", type: "work" },
      { date: "13 Mar", day: "Fri", type: "work" },
      { date: "14 Mar", day: "Sat", type: "work" },
      { date: "15 Mar", day: "Sun", type: "off" },
    ],
    expenseDays: 8,
    extras: [
      { label: "💳 Loan Payment (12 Mar)", amount: 188 }
    ],
    warning: null
  },
  {
    num: 4,
    label: "Cycle 4",
    dates: "16 Mar – 22 Mar",
    payday: "Wed 25 Mar",
    days: [
      { date: "16 Mar", day: "Mon", type: "work" },
      { date: "17 Mar", day: "Tue", type: "work" },
      { date: "18 Mar", day: "Wed", type: "work" },
      { date: "19 Mar", day: "Thu", type: "work" },
      { date: "20 Mar", day: "Fri", type: "work" },
      { date: "21 Mar", day: "Sat", type: "nowork", note: "Cannot work" },
      { date: "22 Mar", day: "Sun", type: "off" },
    ],
    expenseDays: 8,
    extras: [
      { label: "✈️  Batam Trip (24–26 Mar)", amount: 300 }
    ],
    warning: null
  },
  {
    num: 5,
    label: "Cycle 5",
    dates: "23 Mar – 29 Mar",
    payday: "Wed 1 Apr",
    days: [
      { date: "23 Mar", day: "Mon", type: "work" },
      { date: "24 Mar", day: "Tue", type: "nowork", note: "Batam Day 1" },
      { date: "25 Mar", day: "Wed", type: "nowork", note: "Batam Day 2" },
      { date: "26 Mar", day: "Thu", type: "nowork", note: "Batam Day 3" },
      { date: "27 Mar", day: "Fri", type: "work" },
      { date: "28 Mar", day: "Sat", type: "work" },
      { date: "29 Mar", day: "Sun", type: "off" },
    ],
    expenseDays: 8,
    extras: [],
    warning: "⚠️  Only 4 earning days this cycle due to Batam trip."
  }
];

// Calculate expected earnings per day
function expectedEarn(type) {
  if (type === "work") return 200;
  if (type === "off") return 100;
  return 0;
}

// ─── STATE ──────────────────────────────────────────────────────────────────
// actual[cycleIndex][dayIndex] = number or null
const actual = cycles.map(c => c.days.map(() => null));

// Load from localStorage if available
try {
  const saved = localStorage.getItem("delivery_tracker_v1");
  if (saved) {
    const parsed = JSON.parse(saved);
    parsed.forEach((row, ci) => row.forEach((val, di) => {
      if (actual[ci] && actual[ci][di] !== undefined) actual[ci][di] = val;
    }));
  }
} catch(e) {}

function save() {
  try { localStorage.setItem("delivery_tracker_v1", JSON.stringify(actual)); } catch(e) {}
}

// ─── CALCULATIONS ───────────────────────────────────────────────────────────

function calcCycle(ci) {
  const c = cycles[ci];
  const expExp = c.days.reduce((s, d) => s + expectedEarn(d.type), 0);
  const actEarn = actual[ci].reduce((s, v) => s + (v !== null ? v : 0), 0);
  const hasActual = actual[ci].some(v => v !== null);
  const totalExp = (DAILY_EXP * c.expenseDays) + WIFE + c.extras.reduce((s, e) => s + e.amount, 0);
  return { expExp, actEarn, hasActual, totalExp };
}

function calcAllBalances() {
  let bf = 0;
  const results = [];
  cycles.forEach((c, ci) => {
    const { expExp, actEarn, hasActual, totalExp } = calcCycle(ci);
    const earned = hasActual ? actEarn : expExp;
    const balance = bf + earned - totalExp;
    results.push({ bf, earned, expExp, actEarn, hasActual, totalExp, balance });
    bf = balance;
  });
  return results;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function render() {
  const balances = calcAllBalances();
  const container = document.getElementById("cycles-container");
  container.innerHTML = "";

  let totalExpected = 0, totalActual = 0, totalExpenses = 0;
  cycles.forEach((c, ci) => {
    const { expExp, actEarn, hasActual, totalExp } = calcCycle(ci);
    totalExpected += expExp;
    totalActual += actEarn;
    totalExpenses += totalExp;
  });

  const finalBalance = balances[balances.length - 1].balance;

  // Update summary
  document.getElementById("s-expected").textContent = "$" + totalExpected.toLocaleString();
  document.getElementById("s-actual").textContent = "$" + totalActual.toLocaleString();
  document.getElementById("s-expense").textContent = "$" + totalExpenses.toLocaleString();
  document.getElementById("s-balance").textContent = "$" + Math.round(finalBalance).toLocaleString();
  document.getElementById("grand-balance").textContent = "$" + Math.round(finalBalance).toLocaleString();

  // Progress
  const pct = Math.min(100, Math.round((totalActual / totalExpected) * 100));
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";

  // Render cycles
  cycles.forEach((c, ci) => {
    const b = balances[ci];
    const div = document.createElement("div");
    div.className = "cycle";
    div.id = "cycle-" + ci;

    // Warning
    const warnHTML = c.warning ? `<div class="warning">⚠ ${c.warning}</div>` : "";

    // Day rows
    const dayRows = c.days.map((d, di) => {
      const exp = expectedEarn(d.type);
      const actVal = actual[ci][di];
      const isNoWork = d.type === "nowork";
      const isOff = d.type === "off";
      const rowClass = isNoWork ? "no-work" : isOff ? "off-day" : "";
      const badgeClass = isOff ? "off" : "";
      const noteHTML = d.note ? `<span class="note-text">${d.note}</span>` : "";
      const inputHTML = isNoWork ? `<span style="color:var(--red);font-family:'DM Mono',monospace;font-size:13px;">$0</span>` :
        `<input class="earn-actual-input" type="number" placeholder="—" 
          data-ci="${ci}" data-di="${di}"
          value="${actVal !== null ? actVal : ''}"
          min="0" step="1">`;
      return `
        <tr class="${rowClass}">
          <td><span class="day-badge ${badgeClass}">${d.day}</span></td>
          <td style="color:var(--muted);font-size:13px;">${d.date} ${noteHTML}</td>
          <td class="earn-expected">$${exp}</td>
          <td>${inputHTML}</td>
        </tr>`;
    }).join("");

    // Expense rows
    const expRowsHTML = c.extras.map(e =>
      `<div class="expense-row"><span class="e-label">${e.label}</span><span class="e-amount special">−$${e.amount}</span></div>`
    ).join("");

    const dailyExpTotal = DAILY_EXP * c.expenseDays;

    div.innerHTML = `
      <div class="cycle-header" onclick="toggleCycle(${ci})">
        <div class="cycle-title">
          <div class="cycle-num">${c.num}</div>
          <div>
            <div style="font-weight:600;font-size:14px;">${c.label} · ${c.dates}</div>
            <div class="cycle-dates">Payday: ${c.payday}</div>
          </div>
        </div>
        <div class="cycle-chips">
          <span class="chip expected">Exp $${b.expExp}</span>
          <span class="chip actual">Act $${b.actEarn}</span>
          <span class="chip balance">Bal $${Math.round(b.balance)}</span>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="cycle-body">
        ${warnHTML}
        <table class="day-table">
          <thead>
            <tr>
              <th>Day</th>
              <th>Date</th>
              <th>Expected</th>
              <th>Actual</th>
            </tr>
          </thead>
          <tbody>${dayRows}</tbody>
        </table>

        <div class="expense-section">
          <h4>Expenses (${c.expenseDays} days to next payday)</h4>
          <div class="expense-grid">
            <div class="expense-row">
              <span class="e-label">🚬 Cigarettes ($18×${c.expenseDays}d)</span>
              <span class="e-amount">−$${18 * c.expenseDays}</span>
            </div>
            <div class="expense-row">
              <span class="e-label">🍱 Food ($20×${c.expenseDays}d)</span>
              <span class="e-amount">−$${20 * c.expenseDays}</span>
            </div>
            <div class="expense-row">
              <span class="e-label">⛽ Petrol ($10avg×${c.expenseDays}d)</span>
              <span class="e-amount">−$${10 * c.expenseDays}</span>
            </div>
            <div class="expense-row">
              <span class="e-label">💑 Wife spending</span>
              <span class="e-amount">−$${WIFE}</span>
            </div>
            ${expRowsHTML}
          </div>

          <div class="cycle-totals">
            <div class="total-row">
              <span class="t-label">Bring Forward</span>
              <span class="t-val bf">$${Math.round(b.bf)}</span>
            </div>
            <div class="total-row">
              <span class="t-label">Expected Earn</span>
              <span class="t-val earned">$${b.expExp}</span>
            </div>
            <div class="total-row">
              <span class="t-label">Actual Earn</span>
              <span class="t-val actual">$${b.actEarn}</span>
            </div>
            <div class="total-row">
              <span class="t-label">Total Deducted</span>
              <span class="t-val deducted">−$${b.totalExp}</span>
            </div>
            <div class="total-row">
              <span class="t-label">Balance After Pay</span>
              <span class="t-val balance">$${Math.round(b.balance)}</span>
            </div>
          </div>
        </div>
      </div>`;

    container.appendChild(div);
  });

  // Re-attach input listeners
  document.querySelectorAll(".earn-actual-input").forEach(inp => {
    inp.addEventListener("input", function() {
      const ci = parseInt(this.dataset.ci);
      const di = parseInt(this.dataset.di);
      const val = this.value.trim();
      actual[ci][di] = val === "" ? null : parseFloat(val) || 0;
      save();
      render();
      // Reopen the cycle
      const cyc = document.getElementById("cycle-" + ci);
      if (cyc) { cyc.classList.add("open"); }
    });
  });

  // Restore open states
  openCycles.forEach(ci => {
    const el = document.getElementById("cycle-" + ci);
    if (el) el.classList.add("open");
  });
}

const openCycles = new Set();

function toggleCycle(ci) {
  const el = document.getElementById("cycle-" + ci);
  if (!el) return;
  el.classList.toggle("open");
  if (el.classList.contains("open")) openCycles.add(ci);
  else openCycles.delete(ci);
}

// Open first cycle by default
openCycles.add(0);
render();
</script>
</body>
</html>
