  body {

// ─── PWA SERVICE WORKER ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'pay-tracker-v1';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

dismissBtn.addEventListener('click', () => installBanner.classList.remove('show'));

  offlineBanner.classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);

}

// ─── STATE ───────────────────────────────────────────────────────────────────
const actual = cycles.map(c => c.days.map(() => null));

try {
  const saved = localStorage.getItem("pay_tracker_v2");
  if (saved) {
    const parsed = JSON.parse(saved);
    parsed.forEach((row, ci) => row && row.forEach((val, di) => {
      if (actual[ci] && actual[ci][di] !== undefined) actual[ci][di] = val;
    }));
  }
} catch(e) {}

function save() {
  try {
    localStorage.setItem("pay_tracker_v2", JSON.stringify(actual));
    showToast('✓ Saved');
  } catch(e) {}
}

// ─── CALC ────────────────────────────────────────────────────────────────────
function calcCycle(ci) {
  const c = cycles[ci];
  const expExp = c.days.reduce((s, d) => s + expectedEarn(d.type), 0);
  const actEarn = actual[ci].reduce((s, v) => s + (v !== null ? v : 0), 0);
  const hasActual = actual[ci].some(v => v !== null);
  const totalExp = (DAILY_EXP * c.expenseDays) + WIFE + c.extras.reduce((s, e) => s + e.amount, 0);
  return { expExp, actEarn, hasActual, totalExp };
}

function calcAllBalances() {
  let bf = 0;
  const results = [];
  cycles.forEach((c, ci) => {
    const { expExp, actEarn, hasActual, totalExp } = calcCycle(ci);
    const earned = hasActual ? actEarn : expExp;
    const balance = bf + earned - totalExp;
    results.push({ bf, earned, expExp, actEarn, hasActual, totalExp, balance });
    bf = balance;
  });
  return results;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const openCycles = new Set([0]);

function render() {
  const balances = calcAllBalances();
  const container = document.getElementById("cycles-container");
  container.innerHTML = "";

  let totalExpected = 0, totalActual = 0, totalExpenses = 0;
  cycles.forEach((c, ci) => {
    const { expExp, actEarn, totalExp } = calcCycle(ci);
    totalExpected += expExp;
    totalActual += actEarn;
    totalExpenses += totalExp;
  });

  const finalBalance = balances[balances.length - 1].balance;

  document.getElementById("s-expected").textContent = "$" + totalExpected.toLocaleString();
  document.getElementById("s-actual").textContent = "$" + totalActual.toLocaleString();
  document.getElementById("s-expense").textContent = "$" + totalExpenses.toLocaleString();
  document.getElementById("s-balance").textContent = "$" + Math.round(finalBalance).toLocaleString();
  document.getElementById("grand-balance").textContent = "$" + Math.round(finalBalance).toLocaleString();

  const pct = totalExpected > 0 ? Math.min(100, Math.round((totalActual / totalExpected) * 100)) : 0;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";

  cycles.forEach((c, ci) => {
    const b = balances[ci];
    const div = document.createElement("div");
    div.className = "cycle" + (openCycles.has(ci) ? " open" : "");
    div.id = "cycle-" + ci;

    const warnHTML = c.warning ? `<div class="warning">⚠ ${c.warning}</div>` : "";

    const dayRows = c.days.map((d, di) => {
      const exp = expectedEarn(d.type);
      const actVal = actual[ci][di];
      const isNoWork = d.type === "nowork";
      const isOff = d.type === "off";
      const rowClass = isNoWork ? "no-work" : isOff ? "off-day" : "";
      const badgeClass = isOff ? "off" : "";
      const noteHTML = d.note ? `<span class="note-text">${d.note}</span>` : "";
      const inputHTML = isNoWork
        ? `<span style="color:var(--red);font-family:'DM Mono',monospace;font-size:12px;">$0</span>`
        : `<input class="earn-actual-input" type="number" inputmode="numeric" placeholder="—"
            data-ci="${ci}" data-di="${di}"
            value="${actVal !== null ? actVal : ''}"
            min="0" step="1">`;
      return `<tr class="${rowClass}">
        <td><span class="day-badge ${badgeClass}">${d.day}</span></td>
        <td style="color:var(--muted);font-size:12px;">${d.date}${noteHTML}</td>
        <td class="earn-expected">$${exp}</td>
        <td>${inputHTML}</td>
      </tr>`;
    }).join("");

    const expRowsHTML = c.extras.map(e =>
      `<div class="expense-row"><span class="e-label">${e.label}</span><span class="e-amount special">−$${e.amount}</span></div>`
    ).join("");

    div.innerHTML = `
      <div class="cycle-header" onclick="toggleCycle(${ci})">
        <div class="cycle-title">
          <div class="cycle-num">${c.num}</div>
          <div class="cycle-info">
            <div class="ci-title">${c.label} · ${c.dates}</div>
            <div class="cycle-dates">📅 Payday: ${c.payday}</div>
          </div>
        </div>
        <div class="cycle-chips">
          <span class="chip expected">E $${b.expExp}</span>
          <span class="chip actual">A $${b.actEarn}</span>
          <span class="chip balance">B $${Math.round(b.balance)}</span>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="cycle-body">
        ${warnHTML}
        <table class="day-table">
          <thead><tr>
            <th>Day</th><th>Date</th><th>Expect</th><th>Actual</th>
          </tr></thead>
          <tbody>${dayRows}</tbody>
        </table>
        <div class="expense-section">
          <h4>Expenses · ${c.expenseDays} days till payday</h4>
          <div class="expense-grid">
            <div class="expense-row"><span class="e-label">🚬 Cigs ×${c.expenseDays}d</span><span class="e-amount">−$${18*c.expenseDays}</span></div>
            <div class="expense-row"><span class="e-label">🍱 Food ×${c.expenseDays}d</span><span class="e-amount">−$${20*c.expenseDays}</span></div>
            <div class="expense-row"><span class="e-label">⛽ Petrol ×${c.expenseDays}d</span><span class="e-amount">−$${10*c.expenseDays}</span></div>
            <div class="expense-row"><span class="e-label">💑 Wife</span><span class="e-amount">−$${WIFE}</span></div>
            ${expRowsHTML}
          </div>
          <div class="cycle-totals">
            <div class="total-row"><span class="t-label">Bring Fwd</span><span class="t-val bf">$${Math.round(b.bf)}</span></div>
            <div class="total-row"><span class="t-label">Exp Earn</span><span class="t-val earned">$${b.expExp}</span></div>
            <div class="total-row"><span class="t-label">Act Earn</span><span class="t-val actual">$${b.actEarn}</span></div>
            <div class="total-row"><span class="t-label">Deducted</span><span class="t-val deducted">−$${b.totalExp}</span></div>
            <div class="total-row" style="grid-column:1/-1"><span class="t-label">Balance After Payday</span><span class="t-val balance" style="font-size:28px;">$${Math.round(b.balance)}</span></div>
          </div>
        </div>
      </div>`;

    container.appendChild(div);
  });

  document.querySelectorAll(".earn-actual-input").forEach(inp => {
    inp.addEventListener("change", function() {
      const ci = parseInt(this.dataset.ci);
      const di = parseInt(this.dataset.di);
      const val = this.value.trim();
      actual[ci][di] = val === "" ? null : parseFloat(val) || 0;
      save();
      render();
      const cyc = document.getElementById("cycle-" + ci);
      if (cyc) cyc.classList.add("open");
    });
  });
}

function toggleCycle(ci) {
  const el = document.getElementById("cycle-" + ci);
  if (!el) return;
  el.classList.toggle("open");
  if (el.classList.contains("open")) openCycles.add(ci);
  else openCycles.delete(ci);
}

render();
</script>
</body>
</html>
